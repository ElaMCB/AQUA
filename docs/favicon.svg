<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="A.Q.U.A">
  <defs>
    <linearGradient id="drop" x1="16" y1="3" x2="16" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="25%" stop-color="#67e8f9"/>
      <stop offset="55%" stop-color="#22d3ee"/>
      <stop offset="85%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#155e75"/>
    </linearGradient>
    <radialGradient id="glow" cx="16" cy="16" r="14" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shine" x1="10" y1="8" x2="18" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Deep ocean tile -->
  <rect width="32" height="32" rx="7" fill="#041018"/>

  <!-- Ambient glow -->
  <circle cx="16" cy="17" r="13" fill="url(#glow)"/>

  <!-- Water droplet -->
  <path
    d="M16 4.5 C16 4.5 9 13.5 9 19.5 C9 23.64 12.14 27 16 27 C19.86 27 23 23.64 23 19.5 C23 13.5 16 4.5 16 4.5 Z"
    fill="url(#drop)"
  />

  <!-- Surface highlight -->
  <ellipse cx="13.2" cy="15.5" rx="2.8" ry="4.2" fill="url(#shine)" opacity="0.55"/>

  <!-- Tiny A.Q.U.A dots -->
  <circle cx="12.5" cy="21.5" r="0.9" fill="#ecfeff" opacity="0.9"/>
  <circle cx="14.8" cy="21.5" r="0.9" fill="#a5f3fc" opacity="0.85"/>
  <circle cx="17.2" cy="21.5" r="0.9" fill="#a5f3fc" opacity="0.85"/>
  <circle cx="19.5" cy="21.5" r="0.9" fill="#ecfeff" opacity="0.9"/>
</svg>
